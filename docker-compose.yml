services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file: ./backend/.env
    environment:
      PORT: "8000"

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    env_file: ./agent/.env
    environment:
      PORT: "8000"
